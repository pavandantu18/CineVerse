<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#bgGrad)" rx="6"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="112" x2="300" y2="112" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="225" x2="300" y2="225" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="338" x2="300" y2="338" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Film strip top -->
  <rect x="0" y="0" width="300" height="40" fill="#0a0a14" rx="0"/>
  <rect x="8"   y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="40"  y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="72"  y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="104" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="136" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="168" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="200" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="232" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="264" y="7" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>

  <!-- Film strip bottom -->
  <rect x="0" y="410" width="300" height="40" fill="#0a0a14"/>
  <rect x="8"   y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="40"  y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="72"  y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="104" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="136" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="168" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="200" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="232" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>
  <rect x="264" y="417" width="24" height="26" rx="4" fill="#1e1e32" stroke="#2a2a44" stroke-width="1"/>

  <!-- Clapperboard body -->
  <rect x="80" y="155" width="140" height="110" rx="8" fill="#1a1a2e" stroke="#2e2e4e" stroke-width="2"/>

  <!-- Clapperboard top bar (red) -->
  <rect x="80" y="155" width="140" height="32" rx="8" fill="url(#iconGrad)"/>
  <rect x="80" y="175" width="140" height="12" fill="url(#iconGrad)"/>

  <!-- Diagonal stripes on clapper -->
  <clipPath id="clip"><rect x="80" y="155" width="140" height="32" rx="8"/></clipPath>
  <g clip-path="url(#clip)">
    <line x1="88"  y1="155" x2="70"  y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="108" y1="155" x2="90"  y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="128" y1="155" x2="110" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="148" y1="155" x2="130" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="168" y1="155" x2="150" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="188" y1="155" x2="170" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="208" y1="155" x2="190" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
    <line x1="228" y1="155" x2="210" y2="187" stroke="#fff" stroke-width="7" stroke-opacity="0.2"/>
  </g>

  <!-- Play circle -->
  <circle cx="150" cy="225" r="22" fill="none" stroke="#2e2e4e" stroke-width="2.5"/>
  <polygon points="144,215 144,235 166,225" fill="#2e2e4e"/>

  <!-- Label -->
  <text x="150" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600"
        fill="#2e2e4a" text-anchor="middle" letter-spacing="1">NO IMAGE</text>
</svg>
